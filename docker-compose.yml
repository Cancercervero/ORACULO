version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warren_core
      POSTGRES_USER: warren
      POSTGRES_PASSWORD: ${PG_PASSWORD:-warren_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warren -d warren_core"]
      interval: 5s
      retries: 10

  warren-core:
    build: ./warren-core
    ports:
      - "9000:9000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://warren:${PG_PASSWORD:-warren_dev}@postgres/warren_core
      LLM_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      PROB_DAMPENING: "0.15"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  shadowbroker:
    build:
      context: ./shadowbroker_analysis
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  win-system:
    build:
      context: ./WIN_System
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WARREN_CORE_URL: http://warren-core:9000
      LLM_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    command: python council_orchestrator.py
    depends_on:
      redis:
        condition: service_healthy
      warren-core:
        condition: service_started

  mirofish:
    build: ./mirofish_analysis
    ports:
      - "5001:5001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  pg-data:
